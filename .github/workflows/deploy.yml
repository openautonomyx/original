name: Auto Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - 'db/**'
      - 'docker-compose.yml'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'

env:
  VPS_HOST: agennext.com
  VPS_USER: almalinux
  VPS_PORT: 22

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          script: |
            set -e
            cd ~/creative-platform

            echo "=========================================="
            echo "🚀 Starting deployment to VPS"
            echo "=========================================="
            echo ""

            echo "📥 Pulling latest code from GitHub..."
            git pull origin main
            echo "✅ Code updated"
            echo ""

            echo "🔨 Building API Docker image..."
            docker-compose build --no-cache api
            echo "✅ Docker image built"
            echo ""

            echo "🚀 Starting services..."
            docker-compose -f docker-compose.yml -f deploy/docker-compose.production.yml up -d
            echo "✅ Services started"
            echo ""

            echo "⏳ Waiting 30 seconds for services to stabilize..."
            sleep 30

            echo "📊 Container status:"
            docker-compose ps
            echo ""

            echo "🔍 Testing health endpoint..."
            HEALTH=$(curl -s http://localhost:3001/health)
            if [ -n "$HEALTH" ]; then
              echo "✅ Health Check PASSED"
              echo "Response: $HEALTH"
            else
              echo "❌ Health Check FAILED"
              echo "Logs:"
              docker-compose logs api --tail=20
              exit 1
            fi
            echo ""

            echo "=========================================="
            echo "✅ DEPLOYMENT COMPLETE!"
            echo "=========================================="
            echo ""
            echo "📊 API is LIVE at:"
            echo "  • Health: http://agennext.com:3001/health"
            echo "  • API Base: http://agennext.com:3001/api/v1/"
            echo "  • Grafana: http://agennext.com:3000"
            echo ""

      - name: Notify Success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "API is live at http://agennext.com:3001/health"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check VPS logs: ssh almalinux@agennext.com 'cd creative-platform && docker-compose logs api'"
