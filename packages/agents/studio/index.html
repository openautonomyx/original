<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Audience Experience Studio</title>
  <meta name="description" content="Create multimodal publishing experiences for specific audience segments." />
  <link rel="canonical" href="https://openautonomyx.github.io/Publishing-Platform/studio/" />
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}
    .container{width:min(1100px,calc(100% - 40px));margin:0 auto;padding:40px 0}
    h1{font-size:clamp(2.4rem,7vw,4.8rem);line-height:.95;letter-spacing:-.06em;margin:0 0 12px}
    .lead{font-size:1.15rem;color:#475569;max-width:760px;line-height:1.7}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:24px;margin-top:32px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:24px;box-shadow:0 18px 48px rgba(15,23,42,.07)}
    label{display:block;font-size:.9rem;font-weight:700;color:#475569;margin:12px 0 6px}
    input,select,textarea{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:12px;font:inherit}
    textarea{min-height:180px;resize:vertical}
    button{width:100%;padding:12px 14px;border:0;border-radius:12px;background:#2563eb;color:#fff;font-weight:800;cursor:pointer;margin-top:14px}
    pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:18px;border-radius:18px;overflow:auto;min-height:420px}
    a{color:#2563eb;text-decoration:none;font-weight:700}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="container">
    <a href="../">← Back to Home</a>
    <h1>Audience Experience Studio</h1>
    <p class="lead">Publishers can define audience segments and generate multimodal experiences tailored to each audience, including landing pages, emails, social posts, audio scripts, and video storyboards.</p>
    <section class="grid">
      <div class="card">
        <label>API Base URL</label>
        <input id="apiBase" placeholder="https://your-vercel-app.vercel.app" />
        <label>Audience Segment</label>
        <select id="segment">
          <option value="founders">Founders & Operators</option>
          <option value="developers">Developers & Builders</option>
          <option value="marketers">Growth & Marketing Teams</option>
          <option value="executives">Executives & Decision Makers</option>
        </select>
        <label>Experience Title</label>
        <input id="title" value="Launching an AI-Native Publishing Platform" />
        <label>Canonical URL</label>
        <input id="canonicalUrl" value="https://openautonomyx.github.io/Publishing-Platform/" />
        <label>Core Content</label>
        <textarea id="content">The Publishing Platform helps teams generate SEO-ready content, visual assets, and audience-specific experiences from one AI-native workflow.</textarea>
        <button id="generate">Generate Experience Bundle</button>
      </div>
      <div class="card">
        <pre id="output">Experience bundle output will appear here.</pre>
      </div>
    </section>
  </main>
  <script>
    const fallback = (payload) => ({
      segment: payload.segment,
      title: payload.title,
      experience: {
        landingPage: { headline: payload.title, summary: payload.content.slice(0, 220) },
        email: { subject: payload.title, previewText: payload.content.slice(0, 140) },
        social: { caption: payload.content.slice(0, 280), hashtags: ['#AIPublishing', '#ContentStrategy'] },
        audioScript: `Welcome to ${payload.title}. ${payload.content.slice(0, 500)}`,
        videoStoryboard: ['Hook', 'Benefit', 'How it works', 'CTA']
      }
    });

    document.getElementById('generate').onclick = async () => {
      const payload = {
        segment: document.getElementById('segment').value,
        title: document.getElementById('title').value,
        canonicalUrl: document.getElementById('canonicalUrl').value,
        content: document.getElementById('content').value
      };

      try {
        const base = document.getElementById('apiBase').value.trim().replace(/\/$/, '');
        const url = (base || '') + '/api/push-experience.js';
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error(await response.text());
        document.getElementById('output').textContent = JSON.stringify(await response.json(), null, 2);
      } catch (error) {
        document.getElementById('output').textContent = JSON.stringify(fallback(payload), null, 2) + '\n\nFallback used: ' + error.message;
      }
    };
  </script>
</body>
</html>
