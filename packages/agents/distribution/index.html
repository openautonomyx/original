<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Distribution Studio</title>
  <meta name="description" content="Publish content to multiple platforms, languages, and formats." />
  <link rel="canonical" href="https://openautonomyx.github.io/Publishing-Platform/distribution/" />
  <style>
    body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;background:#f8fafc;color:#0f172a}
    .container{width:min(1100px,calc(100% - 40px));margin:0 auto;padding:40px 0}
    h1{font-size:clamp(2.4rem,7vw,4.8rem);line-height:.95;letter-spacing:-.06em;margin:0 0 12px}
    .lead{font-size:1.15rem;color:#475569;max-width:760px;line-height:1.7}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:24px;margin-top:32px}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:24px;box-shadow:0 18px 48px rgba(15,23,42,.07)}
    label{display:block;font-size:.9rem;font-weight:700;color:#475569;margin:12px 0 6px}
    input,textarea{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:12px;font:inherit}
    textarea{min-height:180px;resize:vertical}
    button{width:100%;padding:12px 14px;border:0;border-radius:12px;background:#2563eb;color:#fff;font-weight:800;cursor:pointer;margin-top:14px}
    pre{white-space:pre-wrap;background:#0f172a;color:#e2e8f0;padding:18px;border-radius:18px;overflow:auto;min-height:420px}
    a{color:#2563eb;text-decoration:none;font-weight:700}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="container">
    <a href="../">← Back to Home</a>
    <h1>Distribution Studio</h1>
    <p class="lead">Publish one piece of content to multiple platforms, languages, and formats in a single workflow.</p>
    <section class="grid">
      <div class="card">
        <label>API Base URL</label>
        <input id="apiBase" placeholder="https://your-vercel-app.vercel.app" />
        <label>Title</label>
        <input id="title" value="Launching an AI-Native Publishing Platform" />
        <label>Body</label>
        <textarea id="body">The Publishing Platform generates content, SEO metadata, visuals, and audience experiences for every channel.</textarea>
        <label>Platforms (comma-separated)</label>
        <input id="platforms" value="github-pages,linkedin,medium,substack" />
        <label>Languages (comma-separated)</label>
        <input id="languages" value="en,es,fr,de,hi" />
        <label>Formats (comma-separated)</label>
        <input id="formats" value="article,newsletter,social-post,video-script,podcast-script" />
        <button id="distribute">Generate Distribution Plan</button>
      </div>
      <div class="card">
        <pre id="output">Distribution plan will appear here.</pre>
      </div>
    </section>
  </main>
  <script>
    document.getElementById('distribute').onclick = async () => {
      const payload = {
        title: document.getElementById('title').value,
        body: document.getElementById('body').value,
        platforms: document.getElementById('platforms').value.split(',').map(v => v.trim()).filter(Boolean),
        languages: document.getElementById('languages').value.split(',').map(v => v.trim()).filter(Boolean),
        formats: document.getElementById('formats').value.split(',').map(v => v.trim()).filter(Boolean)
      };

      try {
        const base = document.getElementById('apiBase').value.trim().replace(/\/$/, '');
        const url = (base || '') + '/api/distribute.js';
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!response.ok) throw new Error(await response.text());
        document.getElementById('output').textContent = JSON.stringify(await response.json(), null, 2);
      } catch (error) {
        document.getElementById('output').textContent = 'Error: ' + error.message;
      }
    };
  </script>
</body>
</html>
